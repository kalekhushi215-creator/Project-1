<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Khushi's Website</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:320px;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff4081;
    }

    p{
      color:#444;
      font-size:16px;
    }

    button{
      background:#ff4081;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      margin-top:15px;
    }

    button:hover{
      background:#e91e63;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hello World 🌸</h1>

    <p>
      Hi, I am Khushi.<br>
      I am learning Web Development, GitHub, DevOps and Cloud ☁️
    </p>

    <button onclick="showMessage()">
      Click Me
    </button>
  </div>

  <script>
    function showMessage(){
      alert("Welcome to my first website 🚀");
    }
  </script>

</body>
</html>
